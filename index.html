<!DOCTYPE html>
<!-- Created with https://packager.turbowarp.org/ -->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- We only include this to explicitly loosen the CSP of various packager environments. It does not provide any security. -->
  <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob:">
  <title>強震モニタ風地震シミュレーション</title>
  <style>
    body {
      color: #ffffff;
      font-family: sans-serif;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    :root, body.is-fullscreen {
      background-color: #000000;
    }
    [hidden] {
      display: none !important;
    }
    h1 {
      font-weight: normal;
    }
    a {
      color: inherit;
      text-decoration: underline;
      cursor: pointer;
    }

    #app, #loading, #error, #launch {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      background-color: #000000;
    }
    #launch {
      background-color: rgba(0, 0, 0, 0.7);
      cursor: pointer;
    }
    .launch-title {
      font-size: 20px;
      margin: 0 0 32px;
      letter-spacing: 0.1em;
      color: #e8f7ff;
      text-shadow: 0 0 14px rgba(0, 200, 255, 0.55);
    }
    .launch-button {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(0, 200, 255, 0.06);
      border: 2px solid rgba(0, 200, 255, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      animation: launch-pulse 2s ease-in-out infinite;
    }
    .launch-button svg {
      margin-left: 6px;
    }
    @keyframes launch-pulse {
      0%, 100% { box-shadow: 0 0 14px rgba(0, 200, 255, 0.25), inset 0 0 10px rgba(0, 200, 255, 0.1); transform: scale(1); }
      50% { box-shadow: 0 0 36px rgba(0, 200, 255, 0.6), inset 0 0 20px rgba(0, 200, 255, 0.25); transform: scale(1.06); }
    }
    .launch-hint {
      margin-top: 28px;
      font-size: 13px;
      color: rgba(232, 247, 255, 0.7);
      letter-spacing: 0.25em;
      animation: hint-blink 1.6s ease-in-out infinite;
    }
    @keyframes hint-blink {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
    #loading {
      
    }
    .spinner {
      position: relative;
      width: 96px;
      height: 96px;
    }
    .spinner > svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .spinner-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.12);
      stroke-width: 6;
    }
    .spinner-value {
      fill: none;
      stroke: #00c8ff;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 263.9;
      stroke-dashoffset: 263.9;
      transition: stroke-dashoffset 0.2s ease-out;
      filter: drop-shadow(0 0 6px rgba(0, 200, 255, 0.7));
    }
    .spinner-spin {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: rgba(0, 200, 255, 0.55);
      animation: spinner-rotate 1s linear infinite;
    }
    @keyframes spinner-rotate {
      to { transform: rotate(360deg); }
    }
    .spinner-percent {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      color: #e8f7ff;
      font-variant-numeric: tabular-nums;
    }
    noscript {
      font-weight: normal;
      font-size: 36px;
      margin: 0 0 16px;
    }
    #error-message, #error-stack {
      font-family: monospace;
      max-width: 600px;
      white-space: pre-wrap;
      user-select: text;
      -webkit-user-select: text;
    }
    #error-stack {
      text-align: left;
      max-height: 200px;
      overflow: auto;
    }
    .control-button {
      width: 2rem;
      height: 2rem;
      padding: 0.375rem;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
      border: 0;
      border-radius: 4px;
    }
    .control-button-highlight:hover {
      background: #ff4c4c26;
    }
    .control-button-highlight.active {
      background: #ff4c4c59;
    }
    .fullscreen-button {
      background: white;
    }
    .standalone-fullscreen-button {
      position: absolute;
      top: 0;
      right: 0;
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 0 0 0 4px;
      padding: 4px;
      cursor: pointer;
    }
    .sc-canvas {
      cursor: auto;
    }
    .sc-monitor-root[data-opcode^="data_"] .sc-monitor-value-color {
      background-color: #ff8c1a;
    }

    /* Enhanced Slider Styling */
    .sc-monitor-root input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 5px;
      background: linear-gradient(to right, #ff6b35, #ff8c1a, #ffa500);
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
    }

    .sc-monitor-root input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffeb3b, #ffc107);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 235, 59, 0.8), inset 0 -2px 4px rgba(0, 0, 0, 0.3);
      border: 2px solid #ff8c1a;
      transition: all 0.2s ease;
    }

    .sc-monitor-root input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(255, 235, 59, 1), inset 0 -2px 4px rgba(0, 0, 0, 0.3);
    }

    .sc-monitor-root input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffeb3b, #ffc107);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 235, 59, 0.8), inset 0 -2px 4px rgba(0, 0, 0, 0.3);
      border: 2px solid #ff8c1a;
      transition: all 0.2s ease;
    }

    .sc-monitor-root input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(255, 235, 59, 1), inset 0 -2px 4px rgba(0, 0, 0, 0.3);
    }

    .sc-monitor-root input[type="range"]::-moz-range-track {
      background: transparent;
      border: none;
    }

    /* Enhanced Epicenter Selector */
    .sc-monitor-row-value-outer {
      background: linear-gradient(135deg, #ff8c1a 0%, #ffa500 50%, #ff7f00 100%);
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(255, 140, 26, 0.6), inset 0 1px 3px rgba(255, 255, 255, 0.3);
      border: 2px solid #ffb84d;
      transition: all 0.3s ease;
    }

    .sc-monitor-row-value-outer:hover {
      box-shadow: 0 0 20px rgba(255, 140, 26, 0.9), inset 0 1px 3px rgba(255, 255, 255, 0.5);
      transform: scale(1.05);
    }

    .sc-monitor-row-value-editing .sc-monitor-row-value-outer {
      background: linear-gradient(135deg, #ff6b35 0%, #ff8c1a 50%, #ffa500 100%);
      box-shadow: 0 0 25px rgba(255, 107, 53, 1), inset 0 1px 5px rgba(255, 255, 255, 0.4);
      border-color: #ffd580;
    }
    
  </style>
  <meta name="theme-color" content="#000000">
  
</head>
<body>
  <div id="app"></div>

  <div id="launch" class="screen" hidden title="Click to start">
    <h1 class="launch-title">強震モニタ風地震シミュレーション</h1>
    <div class="launch-button">
      <svg viewBox="0 0 24 24" width="40" height="40" fill="#00c8ff" aria-hidden="true">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </div>
    <div class="launch-hint">クリックでスタート</div>
  </div>

  <div id="loading" class="screen">
    <noscript>Enable JavaScript</noscript>
    <div class="spinner">
      <div class="spinner-spin"></div>
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle class="spinner-track" cx="50" cy="50" r="42"></circle>
        <circle class="spinner-value" id="loading-ring" cx="50" cy="50" r="42"></circle>
      </svg>
      <div class="spinner-percent" id="loading-percent">0%</div>
    </div>
  </div>

  <div id="error" class="screen" hidden>
    <h1>Error</h1>
    <details>
      <summary id="error-message"></summary>
      <p id="error-stack"></p>
    </details>
  </div>
